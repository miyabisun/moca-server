name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - name: Build SPA
        run: cd client && bun install && bun run build

      - name: Install audio build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libopus-dev

      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release

      - name: Package artifacts
        run: |
          cp target/release/moca-server moca-server-linux-x86_64
          sha256sum moca-server-linux-x86_64 > moca-server-linux-x86_64.sha256
          tar -czf client-build.tar.gz -C client build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            moca-server-linux-x86_64
            moca-server-linux-x86_64.sha256
            client-build.tar.gz

  # Windows job は撤去済み (2026-07-10)。audiopus_sys 0.2.2 同梱 opus の
  # CMakeLists が CMake 4.x の最低バージョン要件で拒否されるため。
  # 復活させる時は env に CMAKE_POLICY_VERSION_MINIMUM=3.5 を足すと通る見込み。
  # Docker job も撤去済み: VOICEPEAK がコンテナ内でのみ合成を拒否する
  # (コンテナ検知と思われる) ため、配布はネイティブバイナリのみとする。
